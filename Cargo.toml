[package]
name = "framr"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = "0.4"
clap = { version = "4.6", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["png"] }
libframr = { path = "./libframr" }
libc = "0.2"
ureq = "3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
slurp-rs = "0.2"
wl-clipboard-rs = "0.9"
confy = "2"
anyhow = "1.0"
console = "0.15"
dialoguer = "0.12"


[package.metadata.dist]
targets = ["x86_64-unknown-linux-gnu"]
installers = ["shell"]
