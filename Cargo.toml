[package]
name = "framr"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock"] }
clap = { version = "4.6", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["png"] }
libframr = { path = "./libframr" }
libc = "0.2"
ureq = { version = "3", features = ["multipart"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
slurp-rs = "0.2"
wl-clipboard-rs = "0.9"
confy = "2"
anyhow = "1.0"
console = "0.15"
dialoguer = "0.12"
infer = "0.19"


[package.metadata.dist]
targets = ["x86_64-unknown-linux-gnu"]
installers = ["shell"]


[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
